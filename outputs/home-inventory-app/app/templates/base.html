<!doctype html>
<html lang="en">
<head>

  <title>{% block title %}Home Inventory{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

    <a class="brand" href="/">Home Inventory</a>
    <nav>

</html>
