{% extends "base.html" %}
{% block content %}
<div class="section-heading">
  <h1>Create Containers</h1>
  <div class="segmented">
    <button type="button" data-mode="1" class="active">1</button>
    <button type="button" data-mode="4">4</button>
  </div>
</div>
<div id="createGrid" class="create-grid" data-count="1">
  {% for n in range(1,5) %}
  <form class="create-card" data-create-card {% if n > 1 %}hidden{% endif %}>
    <h2>Container {{ n }}</h2>
    <label>Name <input name="name" placeholder="Garage tool chest"></label>
    <div class="form-row">
      <label>Type
        <select name="container_type">
          <option value="box">Box</option>
          <option value="room">Room</option>
          <option value="garage">Garage</option>
          <option value="basement">Basement</option>
          <option value="closet">Closet</option>
          <option value="shelf">Shelf</option>
          <option value="cabinet">Cabinet</option>
          <option value="drawer">Drawer</option>
          <option value="tool_chest">Tool chest</option>
          <option value="bin">Bin</option>
          <option value="bag">Bag</option>
          <option value="safe">Safe</option>
          <option value="area">Area</option>
        </select>
      </label>
      <label>Inside
        <select name="parent_box_id">
          <option value="">Top level</option>
          {% for container in containers %}
          <option value="{{ container.id }}">{{ container.path or container.name }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label>Photos <input name="photos" type="file" accept="image/*" multiple></label>
    <div class="form-row">
      <label>Room <input name="room_name" required placeholder="basement storage room"></label>
      <label>Size <input name="size" placeholder="medium tote"></label>
    </div>
    <div class="form-row thirds">
      <label>North ft <input name="north_ft" type="number" step="0.1" value="0"></label>
      <label>East ft <input name="east_ft" type="number" step="0.1" value="0"></label>
      <label>Elevation ft <input name="elevation_ft" type="number" step="0.1" value="0"></label>
    </div>
    <label>Stack position <input name="stack_position" placeholder="middle shelf, behind blue tote"></label>
    <label>Tags <input name="tags" placeholder="holiday, tools, fragile"></label>
    <label>Notes <textarea name="notes" rows="2"></textarea></label>
    <label class="checkbox"><input name="inaccessible" type="checkbox" value="1"> Inaccessible, stacked, or behind other boxes</label>
    <button class="wide">Create and detect items</button>
  </form>
  {% endfor %}
</div>
{% endblock %}
